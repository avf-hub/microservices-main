# Common configuration
spring:
  liquibase:
    change-log: classpath:db/changelog/db.changelog-inventory.xml
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  datasource:
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  application:
    name: inventory-service
inventory-service:
  create-initial-data-on-start: false

# Profile-specific configuration
---
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:mem:inventory

---
spring:
  config:
    activate:
      on-profile: database-per-service
  datasource:
    url: jdbc:h2:~/data/inventory;AUTO_SERVER=TRUE

---
spring:
  config:
    activate:
      on-profile: shared-database
  datasource:
    url: jdbc:h2:tcp://h2-server:1521/opt/h2-data/laptop_store
  h2:
    console:
      enabled: false
