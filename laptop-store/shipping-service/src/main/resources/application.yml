# Common configuration
server.port:
  8089


#Time needed for the delivery
app:
  shipping-delay: 30s # change to 5 for BDD test

spring:
  liquibase:
    change-log: classpath:db/changelog/db.changelog-shipping.xml
  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
  datasource:
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  application:
    name: shipping-service

# Profile-specific configuration
---
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:mem:shipping

---
spring:
  config:
    activate:
      on-profile: database-per-service
  datasource:
    url: jdbc:h2:~/data/shipping;AUTO_SERVER=TRUE

---
spring:
  config:
    activate:
      on-profile: shared-database
  datasource:
    url: jdbc:h2:tcp://h2-server:1521/opt/h2-data/laptop_store
  h2:
    console:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: docker-compose
  cloud:
    stream:
      kafka:
        binder:
          brokers: kafka-redpanda:9092
