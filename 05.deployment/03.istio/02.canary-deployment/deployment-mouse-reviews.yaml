apiVersion: apps/v1
kind: Deployment
metadata:
  name: mouse-reviews
  labels:
    app: mouse-reviews
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mouse-reviews
      version: v1
  template:
    metadata:
      labels:
        app: mouse-reviews
        version: v1
    spec:
      containers:
        - name: mouse-reviews
          image: mouse-reviews:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: JAVA_OPTIONS
              value: -Xms15m -Xmx15m -Xmn15m
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
